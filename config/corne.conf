# ==========================================
# DISPLAY SETTINGS (ULTRA-LOW REFRESH)
# ==========================================
# Enable the display
CONFIG_ZMK_DISPLAY=y

# Nuke the nice!view mountain and 5-layer dots
CONFIG_NICE_VIEW_WIDGET_STATUS=n

# Force ZMK to use the standard built-in stacked UI
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Enable crucial static data widgets
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# Explicitly disable WPM so the screen isn't constantly refreshing
CONFIG_ZMK_WIDGET_WPM_STATUS=n

# Turn off the screen entirely when the keyboard is idle (before deep sleep)
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ==========================================
# POWER MANAGEMENT (THE DIGITAL SWITCH)
# ==========================================
# Enable Deep Sleep mode (sever the Bluetooth connection)
CONFIG_ZMK_SLEEP=y

# Set Deep Sleep timeout to 10 minutes (600,000 milliseconds)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# ==========================================
# SYSTEM EXTRAS (PREVENT VAMPIRE DRAIN)
# ==========================================
# Explicitly disable RGB underglow and backlights (if any are baked into the PCB)
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_BACKLIGHT=n

# Disable diagnostic USB logging so the board isn't processing background tasks
CONFIG_ZMK_USB_LOGGING=n